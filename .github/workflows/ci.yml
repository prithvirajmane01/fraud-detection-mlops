name: Fraud Detection CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install and test
      run: |
        which python
        which pip
        python --version
        pip --version
        pip install --upgrade pip
        pip install scikit-learn pandas numpy joblib fastapi uvicorn sqlalchemy pymysql python-jose "passlib[bcrypt]" bcrypt==4.0.1 python-multipart scipy pytest httpx
        echo "DATABASE_URL = 'sqlite:///./test.db'" > config.py
        python app/model/train_model.py
        python -m pytest tests/test_api.py -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy confirmed
      run: echo "Tests passed - Render auto-deploys from GitHub"