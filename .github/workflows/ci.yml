name: Fraud Detection CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Create config.py for testing
      run: |
        echo "DATABASE_URL = 'sqlite:///./test.db'" > config.py

    - name: Train model
      run: python app/model/train_model.py

    - name: Run tests
      run: python -m pytest tests/test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Trigger Render deployment
      run: |
        echo "Tests passed - Render auto-deploys from GitHub"